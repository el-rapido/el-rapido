<svg xmlns="http://www.w3.org/2000/svg" width="200" height="44" viewBox="0 0 200 44">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="44" rx="10" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="200" height="44" rx="10" fill="none" stroke="#a89fd8" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Globe icon -->
  <g transform="translate(14, 10)" stroke="#a89fd8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <circle cx="12" cy="12" r="10"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
  </g>

  <!-- Divider -->
  <line x1="48" y1="10" x2="48" y2="34" stroke="#a89fd8" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Text -->
  <text x="62" y="27" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="600" letter-spacing="0.5" fill="#cdd6f4">el-rapido.dev</text>
</svg>
